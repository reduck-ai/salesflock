<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<script>
			// Apply the saved theme before first paint (no flash). Theme is app-wide chrome: the
			// account menu writes localStorage.theme + toggles this same `dark` class. Default: dark.
			try {
				if ((localStorage.theme || "dark") === "dark") document.documentElement.classList.add("dark");
			} catch (e) {}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
